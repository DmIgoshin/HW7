version: '3.8'

services:
  app-blue:
    build:
      context: .
      dockerfile: Dockerfile
    # ports:
    #   - "8000:80" 
    environment:
      APP_VERSION: "1.0.0" # Blue version
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  app-green:
    build:
      context: .
      dockerfile: Dockerfile
    # ports:
    #   - "8001:80" 
    environment:
      APP_VERSION: "1.1.0" 
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:latest
    ports:
      - "80:80" # External port for Nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro # Mount the Nginx config
    depends_on:
      app-blue:
        condition: service_healthy
      app-green:
        condition: service_healthy
